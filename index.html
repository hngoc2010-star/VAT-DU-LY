<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Plywood VAT Đủ Ly</title>

<style>
body{
    font-family:-apple-system,sans-serif;
    background:#f2f2f7;
    margin:0;
    padding:10px;
}

.box{
    max-width:390px;
    margin:auto;
    background:#fff;
    border-radius:16px;
    padding:14px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

h2{
    text-align:center;
    margin:0 0 12px;
}

.row{
    display:flex;
    align-items:center;
    margin-bottom:8px;
}

.row label{
    flex:1;
    font-size:14px;
}

.row input{
    width:120px;
    height:34px;
    text-align:right;
    border:1px solid #ddd;
    border-radius:8px;
    padding:0 8px;
}

.result{
    margin-top:10px;
    border-top:1px solid #eee;
    padding-top:10px;
}

.result div{
    display:flex;
    justify-content:space-between;
    margin:4px 0;
}

.value{
    color:#007AFF;
    font-weight:600;
}
</style>
</head>
<body>

<div class="box">

<h2>Plywood VAT Đủ Ly</h2>

<div class="row">
<label>Thickness (mm)</label>
<input id="thickness" value="11">
</div>

<div class="row">
<label>Width (mm)</label>
<input id="width" value="1220">
</div>

<div class="row">
<label>Length (mm)</label>
<input id="length" value="2440">
</div>

<div class="row">
<label>Bundles</label>
<input id="bundles" value="18">
</div>

<div class="row">
<label>Pcs / Bundle</label>
<input id="pcsBundle" value="90">
</div>

<div class="row">
<label>Price/m³</label>
<input id="priceM3" value="6,300,000">
</div>

<div class="result">

<div>
<span>Total PCS</span>
<span class="value" id="totalPcs"></span>
</div>

<div>
<span>CBM</span>
<span class="value" id="cbm"></span>
</div>

<div>
<span>Amount</span>
<span class="value" id="amount"></span>
</div>

<div>
<span>VAT 8%</span>
<span class="value" id="vat"></span>
</div>

<div>
<span><b>Total Invoice</b></span>
<span class="value" id="total"></span>
</div>

</div>

</div>

<script>

function num(id){
    return Number(
        document.getElementById(id)
        .value.replace(/,/g,'')
    ) || 0;
}

function money(n){
    return Math.round(n)
    .toLocaleString('en-US');
}

function formatInput(el){

    let v = el.value.replace(/,/g,'');

    if(v==='' || isNaN(v)) return;

    el.value =
    Number(v).toLocaleString('en-US');
}

function calc(){

    let thickness = num('thickness');
    let width = num('width');
    let length = num('length');
    let bundles = num('bundles');
    let pcsBundle = num('pcsBundle');
    let priceM3 = num('priceM3');

    let pcs =
    bundles * pcsBundle;

    let cbm =
    width * length *
    thickness *
    pcs /
    1000000000;

    let amount =
    cbm * priceM3;

    let vat =
    amount * 0.08;

    let total =
    amount + vat;

    totalPcs.innerText =
    money(pcs);

    cbm.innerText =
    cbm.toFixed(2);

    amount.innerText =
    money(amount);

    vat.innerText =
    money(vat);

    total.innerText =
    money(total);
}

document.querySelectorAll('input')
.forEach(i=>{

    i.addEventListener('input',()=>{

        if(i.id==='priceM3')
            formatInput(i);

        calc();

    });

});

calc();

</script>

</body>
</html>
